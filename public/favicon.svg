<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark background -->
  <rect width="64" height="64" rx="12" fill="#050505"/>
  <!-- Emerald border -->
  <rect width="64" height="64" rx="12" fill="none" stroke="#10b981" stroke-width="2.5" opacity="0.8"/>
  <!-- Subtle emerald corner glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
  </radialGradient>
  <rect width="64" height="64" rx="12" fill="url(#glow)"/>
  <!-- "CS" text -->
  <text
    x="32"
    y="44"
    text-anchor="middle"
    font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif"
    font-size="28"
    font-weight="800"
    letter-spacing="-1"
    fill="#ffffff"
  >CS</text>
  <!-- Emerald underline accent -->
  <line x1="14" y1="51" x2="50" y2="51" stroke="#10b981" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>